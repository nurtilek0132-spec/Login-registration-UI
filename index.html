<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Welcome</h1>
        <p>Login or create an account</p>
      </div>

      <div class="toggle-buttons">
        <button class="toggle-btn active" data-target="login">Login</button>
        <button class="toggle-btn" data-target="register">Register</button>
      </div>

      <div class="form-panel active" id="login-panel">
        <form id="login-form">
          <div class="input-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Enter your email" required />
          </div>

          <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required />
          </div>

          <button type="submit" class="submit-btn">Login</button>
        </form>
      </div>

      <div class="form-panel" id="register-panel">
        <form id="register-form">
          <div class="input-group">
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" placeholder="Enter your name" required />
          </div>

          <div class="input-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="Enter your email" required />
          </div>

          <div class="input-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Create a password" required />
          </div>

          <div class="input-group">
            <label for="register-confirm">Confirm Password</label>
            <input type="password" id="register-confirm" placeholder="Confirm password" required />
          </div>

          <button type="submit" class="submit-btn">Register</button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
